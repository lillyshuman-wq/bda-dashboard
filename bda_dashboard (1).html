<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BDA Leaderboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #262832; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #fff; min-height: 100vh; }
  .db { padding: 18px 22px; min-height: 100vh; }

  .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid rgba(0,169,224,0.3); }
  .top-bar-left { display:flex; align-items:center; gap:12px; }
  .live-dot { width:9px; height:9px; border-radius:50%; background:#00A9E0; animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .top-title { font-size:16px; font-weight:500; color:rgba(255,255,255,0.75); letter-spacing:.06em; text-transform:uppercase; }
  .top-right { display:flex; align-items:center; gap:10px; }
  .ts { font-size:13px; color:rgba(255,255,255,0.55); }
  .countdown { font-size:12px; color:rgba(255,255,255,0.35); min-width:90px; }
  .btn { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.25); border-radius:6px; color:rgba(255,255,255,0.8); font-size:13px; padding:6px 14px; cursor:pointer; }
  .btn:hover { background:rgba(255,255,255,0.18); }

  .grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:14px; }
  .grid-bot { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .card { background:rgba(0,169,224,0.08); border:1px solid rgba(0,169,224,0.25); border-radius:12px; padding:16px 18px; }
  .card-title { font-size:12px; font-weight:500; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,0.65); margin-bottom:12px; }
  .chart-wrap { position:relative; width:100%; }
  .legend { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
  .leg-item { display:flex; align-items:center; gap:5px; font-size:12px; color:rgba(255,255,255,0.75); }
  .leg-sq { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

  .qm-table { width:100%; border-collapse:collapse; }
  .qm-table tr { border-bottom:1px solid rgba(255,255,255,0.1); }
  .qm-table tr:last-child { border-bottom:none; }
  .qm-table td { padding:9px 4px; font-size:16px; }
  .qm-table td:first-child { color:rgba(255,255,255,0.9); }
  .qm-table td:last-child { text-align:right; font-weight:500; color:#00A9E0; }
  .qm-rank { display:inline-block; width:22px; height:22px; border-radius:50%; font-size:11px; text-align:center; line-height:22px; margin-right:8px; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); }
  .qm-rank.g { background:rgba(255,170,0,0.25); color:#ffcc44; }
  .qm-rank.s { background:rgba(200,200,200,0.2); color:#ddd; }
  .qm-rank.b { background:rgba(205,124,58,0.25); color:#e89a50; }
  .qm-total { background:rgba(255,255,255,0.05); }
  .qm-total td { color:rgba(255,255,255,0.65) !important; font-size:14px !important; }
  .qm-total td:last-child { color:rgba(255,255,255,0.9) !important; }

  .progress-bar-wrap { height:3px; background:rgba(255,255,255,0.1); border-radius:2px; margin-top:10px; overflow:hidden; }
  .progress-bar { height:100%; background:#00A9E0; border-radius:2px; transition:width 1s linear; }

  .status-bar { font-size:11px; color:rgba(255,255,255,0.3); margin-top:6px; min-height:16px; }
  .status-bar.error { color:#f09595; }
</style>
</head>
<body>
<div class="db">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="live-dot"></div>
      <span class="top-title">BDA Leaderboard</span>
    </div>
    <div class="top-right">
      <span class="countdown" id="countdown"></span>
      <span class="ts" id="ts">Loading...</span>
      <button class="btn" onclick="fetchAndRender()">&#8635; Refresh</button>
      <button class="btn" onclick="toggleFS()">&#x26F6; Fullscreen</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title">Total dials — today</div>
      <div class="chart-wrap" style="height:222px"><canvas id="c1"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Total dials — this week</div>
      <div class="chart-wrap" style="height:222px"><canvas id="c2"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Qual calls scheduled — this week</div>
      <div class="chart-wrap" style="height:222px"><canvas id="c3"></canvas></div>
    </div>
  </div>

  <div class="grid-bot">
    <div class="card">
      <div class="card-title">Call-to-meeting conversion — this week</div>
      <div class="legend">
        <span class="leg-item"><span class="leg-sq" style="background:#00A9E0"></span>Conversation</span>
        <span class="leg-item"><span class="leg-sq" style="background:#34EAFF"></span>Meeting Scheduled</span>
      </div>
      <div class="chart-wrap" style="height:185px"><canvas id="c4"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Qual calls scheduled — this month</div>
      <table class="qm-table" id="qmt"><tr><td colspan="2" style="color:rgba(255,255,255,0.3)">Loading...</td></tr></table>
    </div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar" id="progressbar" style="width:100%"></div></div>
  <div class="status-bar" id="statusbar"></div>
</div>

<script>
const REFRESH_MS = 5 * 60 * 1000;
const REPS = [
  { name: 'Avi Chilla',         short: 'Avi C.',        id: '92919672' },
  { name: 'Benny Terefenko',    short: 'Benny T.',      id: '78010725' },
  { name: 'Cole Boyden',        short: 'Cole B.',       id: '92871323' },
  { name: 'Katelynn Patterson', short: 'Katelynn P.',   id: '89923125' },
  { name: 'Rahmel Evans',       short: 'Rahmel E.',     id: '93581117' },
];
const SHORT = REPS.map(r => r.short);
const CORAL='#00A9E0', TEAL='#34EAFF', PURP='#2D4051', AMBR='#E6FDFF';
const GRID='rgba(0,169,224,0.15)', TXT='rgba(255,255,255,0.8)', FONT={size:13};
const baseScales = {
  x:{grid:{color:GRID},ticks:{color:TXT,font:FONT}},
  y:{grid:{color:GRID},ticks:{color:TXT,font:FONT},beginAtZero:true}
};
const baseLayout = { padding: { top: 25 } };

function mkChart(id,type,data,opts){
  const ex=Chart.getChart(id); if(ex) ex.destroy();
  return new Chart(document.getElementById(id),{type,data,options:opts});
}

// Global label plugin - draws value above bars, skips conversion chart (c4)
const valueLabelPlugin = {
  id: 'valueLabels',
  afterDraw(chart) {
    if (chart.canvas.id === 'c4') return; // conversion chart handles its own labels
    const ctx = chart.ctx;
    chart.data.datasets.forEach((dataset, di) => {
      const meta = chart.getDatasetMeta(di);
      if (meta.hidden) return;
      meta.data.forEach((bar, i) => {
        const val = dataset.data[i];
        if (!val) return;
        ctx.save();
        ctx.fillStyle = '#ffffff';
        ctx.font = '700 15px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(val, bar.x, bar.y - 5);
        ctx.restore();
      });
    });
  }
};
Chart.register(valueLabelPlugin);

function buildDials(d){
  const totals=REPS.map((_,i)=>d.dialCallBack[i]+d.dialConnected[i]+d.dialVoicemail[i]+d.dialMeeting[i]);
  mkChart('c1','bar',{labels:SHORT,datasets:[
    {label:'Total Dials',data:totals,backgroundColor:CORAL,borderRadius:3},
  ]},{responsive:true,maintainAspectRatio:false,layout:baseLayout,plugins:{legend:{display:false}},scales:baseScales});
}

function buildWeeklyDials(d){
  mkChart('c2','bar',{labels:SHORT,datasets:[{label:'Weekly Dials',data:d.weeklyDials,backgroundColor:CORAL,borderRadius:3}]},
    {responsive:true,maintainAspectRatio:false,layout:baseLayout,plugins:{legend:{display:false}},scales:baseScales});
}

function buildQual(d){
  mkChart('c3','bar',{labels:SHORT,datasets:[{label:'Qual Calls',data:d.qualCalls,backgroundColor:CORAL,borderRadius:3}]},
    {responsive:true,maintainAspectRatio:false,layout:baseLayout,plugins:{legend:{display:false}},scales:baseScales});
}

// Conversion chart label data — set when buildConversion runs
let _convMtgPct=[], _convConvPct=[], _convRawMtg=[], _convRawConv=[];
const convLabelPlugin = {
  id:'convLabels',
  afterDraw(chart){
    if(chart.canvas.id !== 'c4') return;
    const ctx = chart.ctx;
    const ds0 = chart.getDatasetMeta(0); // Meeting Scheduled (bottom)
    const ds1 = chart.getDatasetMeta(1); // Conversation (top)

    // % inside Meeting Scheduled segment
    ds0.data.forEach((bar,i)=>{
      if(!_convMtgPct[i] || bar.height < 16) return;
      ctx.save();
      ctx.fillStyle='#fff'; ctx.font='700 14px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(_convMtgPct[i]+'%', bar.x, bar.y + bar.height/2);
      ctx.restore();
    });

    // % inside Conversation segment
    ds1.data.forEach((bar,i)=>{
      if(!_convConvPct[i] || bar.height < 20) return;
      ctx.save();
      ctx.fillStyle='#fff'; ctx.font='700 14px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(_convConvPct[i]+'%', bar.x, bar.y + bar.height/2);
      ctx.restore();
    });

    // Total convos + meetings above each full bar
    ds1.data.forEach((bar,i)=>{
      const mtgs  = _convRawMtg[i];
      const convs = _convRawConv[i];
      const label = convs + ' convos, ' + mtgs + ' mtg' + (mtgs !== 1 ? 's' : '');
      ctx.save();
      ctx.fillStyle='#fff'; ctx.font='700 12px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(label, bar.x, bar.y - 6);
      ctx.restore();
    });
  }
};
Chart.register(convLabelPlugin);

function buildConversion(d){
  const activeIdxs = REPS.map((_,i)=>i).filter(i => d.convRawConv[i]+d.convRawMtg[i] > 0);
  const labels = activeIdxs.map(i=>SHORT[i]);

  if(!labels.length){
    mkChart('c4','bar',{labels:SHORT,datasets:[{label:'No Data',data:new Array(SHORT.length).fill(0),backgroundColor:CORAL}]},
      {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{...baseScales.x},y:{...baseScales.y,min:0,max:100}}});
    return;
  }

  _convMtgPct  = activeIdxs.map(i=>d.convPctMtg[i]);
  _convConvPct = activeIdxs.map(i=>100 - d.convPctMtg[i]);
  _convRawMtg  = activeIdxs.map(i=>d.convRawMtg[i]);
  _convRawConv = activeIdxs.map(i=>d.convRawConv[i]);

  mkChart('c4','bar',{labels,datasets:[
    {label:'Meeting Scheduled', data:_convMtgPct,  backgroundColor:TEAL,  stack:'s'},
    {label:'Conversation',      data:_convConvPct, backgroundColor:CORAL, stack:'s'},
  ]},{responsive:true,maintainAspectRatio:false,
    layout:{padding:{top:30}},
    plugins:{legend:{display:false}},
    scales:{x:{...baseScales.x,stacked:true},y:{...baseScales.y,stacked:true,min:0,max:100,ticks:{...baseScales.y.ticks,callback:v=>v+'%'}}}});
}

function buildTable(d){
  const rc=i=>i===0?'g':i===1?'s':i===2?'b':'';
  if(!d.qualScheduled.length){ document.getElementById('qmt').innerHTML='<tr><td colspan="2" style="color:rgba(255,255,255,0.3);font-size:13px">No data yet</td></tr>'; return; }
  let html=d.qualScheduled.map((r,i)=>`<tr><td><span class="qm-rank ${rc(i)}">${i+1}</span>${r.name}</td><td>${r.val}</td></tr>`).join('');
  html+=`<tr class="qm-total"><td style="padding-top:10px">Total</td><td style="padding-top:10px">${d.qualScheduledTotal}</td></tr>`;
  document.getElementById('qmt').innerHTML=html;
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
let countdownTimer=null, secondsLeft=REFRESH_MS/1000;
function startCountdown(){
  if(countdownTimer) clearInterval(countdownTimer);
  secondsLeft=REFRESH_MS/1000; tick();
  countdownTimer=setInterval(()=>{ secondsLeft--; if(secondsLeft<0){secondsLeft=0;} tick(); },1000);
}
function tick(){
  const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
  document.getElementById('countdown').textContent='next refresh '+m+':'+(s<10?'0':'')+s;
  document.getElementById('progressbar').style.width=Math.round((secondsLeft/(REFRESH_MS/1000))*100)+'%';
}

// ─── MAIN FETCH & RENDER ──────────────────────────────────────────────────────
let refreshTimer = null;

async function fetchAndRender() {
  const statusEl = document.getElementById('statusbar');
  statusEl.textContent = 'Loading data...';
  statusEl.className = 'status-bar';

  try {
    const res = await fetch('/data');
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || `Server error ${res.status}`);
    }
    const data = await res.json();

    buildDials(data);
    buildWeeklyDials(data);
    buildQual(data);
    buildConversion(data);
    buildTable(data);

    document.getElementById('ts').textContent = 'Data from ' + data.fetchedAt;
    statusEl.textContent = 'Live — server refreshes HubSpot every 5 min';

  } catch(e) {
    console.error(e);
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.className = 'status-bar error';
  }

  if(refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(fetchAndRender, 30 * 1000); // poll server every 30s
  startCountdown();
}

// ─── FULLSCREEN ───────────────────────────────────────────────────────────────
function toggleFS(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); }
  else { document.exitFullscreen && document.exitFullscreen(); }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
fetchAndRender();
</script>
</body>
</html>
